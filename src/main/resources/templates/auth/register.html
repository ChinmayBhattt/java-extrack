<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register | SmartSpend 2.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="auth-body">

<div class="auth-container">
    <!-- Left Panel -->
    <div class="auth-panel auth-left">
        <div class="auth-brand">
            <span class="brand-icon-lg">💸</span>
            <h1>SmartSpend</h1>
            <p>Your personal finance assistant</p>
        </div>
        <div class="auth-features">
            <div class="feature-item"><i class="bi bi-graph-up-arrow"></i> Monthly Expense Trends</div>
            <div class="feature-item"><i class="bi bi-pie-chart-fill"></i>  Category Breakdown</div>
            <div class="feature-item"><i class="bi bi-bell-fill"></i>       Budget Warning Alerts</div>
            <div class="feature-item"><i class="bi bi-piggy-bank-fill"></i> Savings Calculator</div>
        </div>
    </div>

    <!-- Right Panel – Register Form -->
    <div class="auth-panel auth-right">
        <div class="auth-form-wrapper">
            <h2 class="auth-title">Create account 🚀</h2>
            <p class="auth-subtitle">Start tracking your expenses today</p>

            <div id="errorAlert" class="alert alert-error" style="display:none;"></div>

            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="name"><i class="bi bi-person"></i> Full Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required/>
                    <span class="field-error" id="nameError"></span>
                </div>

                <div class="form-group">
                    <label for="email"><i class="bi bi-envelope"></i> Email</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required/>
                    <span class="field-error" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="salary"><i class="bi bi-currency-rupee"></i> Monthly Salary (optional)</label>
                    <input type="number" id="salary" name="salary" placeholder="50000" min="0" step="100"/>
                    <small class="form-hint">Used for savings calculations and personalised advice</small>
                </div>

                <div class="form-group">
                    <label for="password"><i class="bi bi-lock"></i> Password</label>
                    <div class="input-icon-right">
                        <input type="password" id="password" name="password" placeholder="Min 6 characters" required/>
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <i class="bi bi-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                    <span class="field-error" id="passwordError"></span>
                </div>

                <button type="submit" class="btn-primary btn-full" id="registerBtn">
                    <span id="registerBtnText">Create Account</span>
                    <span id="registerSpinner" class="spinner" style="display:none;"></span>
                </button>
            </form>

            <p class="auth-switch">
                Already have an account? <a th:href="@{/login}">Sign in</a>
            </p>
        </div>
    </div>
</div>

<script th:src="@{/js/app.js}"></script>
<script>
document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn     = document.getElementById('registerBtn');
    const spinner = document.getElementById('registerSpinner');
    const btnText = document.getElementById('registerBtnText');
    const errorAlert = document.getElementById('errorAlert');

    btn.disabled = true;
    spinner.style.display = 'inline-block';
    btnText.textContent = 'Creating account…';
    errorAlert.style.display = 'none';

    // Clear previous field errors
    document.querySelectorAll('.field-error').forEach(el => el.textContent = '');

    const salaryVal = document.getElementById('salary').value;
    const payload = {
        name:     document.getElementById('name').value,
        email:    document.getElementById('email').value,
        password: document.getElementById('password').value,
        salary:   salaryVal ? parseFloat(salaryVal) : 0
    };

    try {
        const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
            credentials: 'include'
        });

        const data = await res.json();

        if (res.ok) {
            window.location.href = '/dashboard';
        } else if (res.status === 400 && data.details) {
            // Show field-level validation errors
            for (const [field, msg] of Object.entries(data.details)) {
                const el = document.getElementById(field + 'Error');
                if (el) el.textContent = msg;
            }
        } else {
            errorAlert.textContent = data.message || 'Registration failed.';
            errorAlert.style.display = 'block';
        }
    } catch (err) {
        errorAlert.textContent = 'Connection error. Please try again.';
        errorAlert.style.display = 'block';
    } finally {
        btn.disabled = false;
        spinner.style.display = 'none';
        btnText.textContent = 'Create Account';
    }
});

function togglePassword() {
    const input = document.getElementById('password');
    const icon  = document.getElementById('eyeIcon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
    }
}
</script>
</body>
</html>
