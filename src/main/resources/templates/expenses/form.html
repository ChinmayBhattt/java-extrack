<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${expense != null} ? 'Edit Expense | SmartSpend' : 'Add Expense | SmartSpend'">Expense Form | SmartSpend</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><span class="brand-icon">💸</span><span class="brand-text">SmartSpend</span></div>
    <nav class="sidebar-nav">
        <a th:href="@{/dashboard}" class="nav-item"><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a>
        <a th:href="@{/expenses}"  class="nav-item active"><i class="bi bi-receipt"></i><span>Expenses</span></a>
        <a th:href="@{/budgets}"   class="nav-item"><i class="bi bi-wallet2"></i><span>Budgets</span></a>
        <a th:href="@{/profile}"   class="nav-item"><i class="bi bi-person-circle"></i><span>Profile</span></a>
    </nav>
    <div class="sidebar-footer"><button class="logout-btn" onclick="logout()"><i class="bi bi-box-arrow-left"></i><span>Logout</span></button></div>
</aside>

<main class="main-content">
    <header class="topbar">
        <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
        <div class="topbar-title" th:text="${expense != null} ? 'Edit Expense' : 'Add Expense'">Add Expense</div>
        <a th:href="@{/expenses}" class="btn-outline"><i class="bi bi-arrow-left"></i> Back</a>
    </header>

    <div class="page-body">
        <div class="form-page-wrapper">
            <div class="card form-card">
                <div class="card-header">
                    <h3>
                        <i th:class="${expense != null} ? 'bi bi-pencil-fill' : 'bi bi-plus-circle-fill'"></i>
                        <span th:text="${expense != null} ? 'Edit Expense Details' : 'Record New Expense'">Add Expense</span>
                    </h3>
                </div>

                <div id="errorAlert" class="alert alert-error" style="display:none;"></div>

                <form id="expenseForm" class="expense-form">
                    <!-- Hidden ID for edit mode -->
                    <input type="hidden" id="expenseId" th:value="${expense?.id}"/>

                    <div class="form-grid">
                        <div class="form-group form-col-2">
                            <label for="title"><i class="bi bi-type"></i> Expense Title *</label>
                            <input type="text" id="title" name="title" placeholder="e.g. Lunch at restaurant"
                                   required th:value="${expense?.title}"/>
                            <span class="field-error" id="titleError"></span>
                        </div>

                        <div class="form-group">
                            <label for="amount"><i class="bi bi-currency-rupee"></i> Amount (₹) *</label>
                            <input type="number" id="amount" name="amount" placeholder="0.00"
                                   step="0.01" min="0.01" required th:value="${expense?.amount}"/>
                            <span class="field-error" id="amountError"></span>
                        </div>

                        <div class="form-group">
                            <label for="category"><i class="bi bi-tag-fill"></i> Category *</label>
                            <select id="category" name="category" required>
                                <option value="">Select a category…</option>
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.name()}"
                                        th:text="${cat.emoji + ' ' + cat.displayName}"
                                        th:selected="${expense?.category?.name() == cat.name()}"></option>
                            </select>
                            <span class="field-error" id="categoryError"></span>
                        </div>

                        <div class="form-group">
                            <label for="expenseDate"><i class="bi bi-calendar3"></i> Date *</label>
                            <input type="date" id="expenseDate" name="expenseDate"
                                   required th:value="${expense?.expenseDate ?: today}"/>
                            <span class="field-error" id="expenseDateError"></span>
                        </div>

                        <div class="form-group form-col-2">
                            <label for="notes"><i class="bi bi-chat-left-text"></i> Notes (optional)</label>
                            <textarea id="notes" name="notes" rows="3"
                                      placeholder="Add any extra details…"
                                      th:text="${expense?.notes}"></textarea>
                        </div>
                    </div>

                    <div class="form-actions">
                        <a th:href="@{/expenses}" class="btn-outline">Cancel</a>
                        <button type="submit" class="btn-primary" id="submitBtn">
                            <span id="submitBtnText" th:text="${expense != null} ? 'Update Expense' : 'Save Expense'">Save</span>
                            <span id="submitSpinner" class="spinner" style="display:none;"></span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<script th:src="@{/js/app.js}"></script>
<script>
const expenseId = document.getElementById('expenseId')?.value;
const isEdit    = !!expenseId;

document.getElementById('expenseForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn     = document.getElementById('submitBtn');
    const spinner = document.getElementById('submitSpinner');
    const btnText = document.getElementById('submitBtnText');
    const errorAlert = document.getElementById('errorAlert');

    btn.disabled = true;
    spinner.style.display = 'inline-block';
    errorAlert.style.display = 'none';
    document.querySelectorAll('.field-error').forEach(el => el.textContent = '');

    const payload = {
        title:       document.getElementById('title').value,
        amount:      parseFloat(document.getElementById('amount').value),
        category:    document.getElementById('category').value,
        expenseDate: document.getElementById('expenseDate').value,
        notes:       document.getElementById('notes').value || null
    };

    const url    = isEdit ? '/api/expenses/' + expenseId : '/api/expenses';
    const method = isEdit ? 'PUT' : 'POST';

    try {
        const res = await fetch(url, {
            method, credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const data = await res.json();

        if (res.ok) {
            window.location.href = '/expenses';
        } else if (res.status === 400 && data.details) {
            for (const [field, msg] of Object.entries(data.details)) {
                const el = document.getElementById(field + 'Error');
                if (el) el.textContent = msg;
            }
        } else {
            errorAlert.textContent = data.message || 'Could not save expense.';
            errorAlert.style.display = 'block';
        }
    } catch (err) {
        errorAlert.textContent = 'Connection error.';
        errorAlert.style.display = 'block';
    } finally {
        btn.disabled = false;
        spinner.style.display = 'none';
    }
});
</script>
</body>
</html>
