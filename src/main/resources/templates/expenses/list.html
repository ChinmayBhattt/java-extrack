<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Expenses | SmartSpend 2.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><span class="brand-icon">💸</span><span class="brand-text">SmartSpend</span></div>
    <nav class="sidebar-nav">
        <a th:href="@{/dashboard}" class="nav-item"><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a>
        <a th:href="@{/expenses}"  class="nav-item active"><i class="bi bi-receipt"></i><span>Expenses</span></a>
        <a th:href="@{/budgets}"   class="nav-item"><i class="bi bi-wallet2"></i><span>Budgets</span></a>
        <a th:href="@{/profile}"   class="nav-item"><i class="bi bi-person-circle"></i><span>Profile</span></a>
    </nav>
    <div class="sidebar-footer"><button class="logout-btn" onclick="logout()"><i class="bi bi-box-arrow-left"></i><span>Logout</span></button></div>
</aside>

<main class="main-content">
    <header class="topbar">
        <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
        <div class="topbar-title">Expenses</div>
        <a th:href="@{/expenses/new}" class="btn-primary"><i class="bi bi-plus-lg"></i> Add Expense</a>
    </header>

    <div class="page-body">
        <div id="alertPlaceholder"></div>

        <!-- Filter Bar -->
        <div class="filter-bar">
            <form id="filterForm" class="filter-form">
                <select id="filterMonth" name="month" class="form-select">
                    <option value="1"  th:selected="${currentMonth == 1}">January</option>
                    <option value="2"  th:selected="${currentMonth == 2}">February</option>
                    <option value="3"  th:selected="${currentMonth == 3}">March</option>
                    <option value="4"  th:selected="${currentMonth == 4}">April</option>
                    <option value="5"  th:selected="${currentMonth == 5}">May</option>
                    <option value="6"  th:selected="${currentMonth == 6}">June</option>
                    <option value="7"  th:selected="${currentMonth == 7}">July</option>
                    <option value="8"  th:selected="${currentMonth == 8}">August</option>
                    <option value="9"  th:selected="${currentMonth == 9}">September</option>
                    <option value="10" th:selected="${currentMonth == 10}">October</option>
                    <option value="11" th:selected="${currentMonth == 11}">November</option>
                    <option value="12" th:selected="${currentMonth == 12}">December</option>
                </select>
                <select id="filterYear" name="year" class="form-select">
                    <option th:value="${currentYear - 1}" th:text="${currentYear - 1}" th:selected="${false}"></option>
                    <option th:value="${currentYear}"     th:text="${currentYear}"     th:selected="${true}"></option>
                </select>
                <select id="filterCategory" name="category" class="form-select">
                    <option value="">All Categories</option>
                    <option th:each="cat : ${categories}" th:value="${cat.name()}"
                            th:text="${cat.emoji + ' ' + cat.displayName}"></option>
                </select>
                <button type="button" class="btn-secondary" onclick="applyFilter()">
                    <i class="bi bi-funnel"></i> Filter
                </button>
            </form>
        </div>

        <!-- Expenses Table -->
        <div class="card">
            <div class="card-header">
                <h3><i class="bi bi-table"></i> Expense Records</h3>
                <span class="badge-count" th:text="${expenses.size()} + ' records'" id="recordCount">0 records</span>
            </div>

            <!-- No records state -->
            <div th:if="${expenses.isEmpty()}" class="empty-state">
                <i class="bi bi-inbox empty-icon"></i>
                <h4>No expenses found</h4>
                <p>Add your first expense to start tracking!</p>
                <a th:href="@{/expenses/new}" class="btn-primary">
                    <i class="bi bi-plus-lg"></i> Add Expense
                </a>
            </div>

            <!-- Table -->
            <div th:unless="${expenses.isEmpty()}" class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Category</th>
                            <th>Date</th>
                            <th>Amount</th>
                            <th>Notes</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="exp : ${expenses}" class="table-row">
                            <td><span class="expense-title" th:text="${exp.title}">Title</span></td>
                            <td>
                                <span class="category-badge">
                                    <span th:text="${exp.categoryEmoji}">🍔</span>
                                    <span th:text="${exp.categoryDisplayName}">Food</span>
                                </span>
                            </td>
                            <td th:text="${exp.expenseDate}">2026-01-01</td>
                            <td class="amount-col">
                                <span class="amount-text" th:text="'₹' + ${#numbers.formatDecimal(exp.amount, 1, 2)}">₹0</span>
                            </td>
                            <td class="notes-col" th:text="${exp.notes ?: '—'}">—</td>
                            <td class="actions-col">
                                <a th:href="@{/expenses/{id}/edit(id=${exp.id})}" class="btn-icon btn-edit" title="Edit">
                                    <i class="bi bi-pencil-fill"></i>
                                </a>
                                <button class="btn-icon btn-delete" title="Delete"
                                        th:onclick="'deleteExpense(' + ${exp.id} + ', this)'">
                                    <i class="bi bi-trash-fill"></i>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<script th:src="@{/js/app.js}"></script>
<script>
function applyFilter() {
    const month    = document.getElementById('filterMonth').value;
    const year     = document.getElementById('filterYear').value;
    const category = document.getElementById('filterCategory').value;

    let url = '/expenses?year=' + year + '&month=' + month;
    if (category) url += '&category=' + category;
    window.location.href = url;
}

async function deleteExpense(id, btn) {
    if (!confirm('Delete this expense? This cannot be undone.')) return;
    btn.disabled = true;
    try {
        const res = await fetch('/api/expenses/' + id, {
            method: 'DELETE', credentials: 'include'
        });
        if (res.ok) {
            btn.closest('tr').style.transition = 'opacity 0.3s';
            btn.closest('tr').style.opacity = '0';
            setTimeout(() => location.reload(), 350);
        } else {
            showAlert('danger', 'Failed to delete expense.');
            btn.disabled = false;
        }
    } catch (err) {
        showAlert('danger', 'Connection error.');
        btn.disabled = false;
    }
}
</script>
</body>
</html>
