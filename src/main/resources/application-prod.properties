# ================================
# SmartSpend 2.0 - Production Config
# Activate with: --spring.profiles.active=prod
# ================================

# ── MySQL Database ────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/smartspend?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=YOUR_MYSQL_USERNAME
spring.datasource.password=YOUR_MYSQL_PASSWORD

# ── JPA / Hibernate ──────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# Use 'validate' or 'update' in production (NEVER create-drop!)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── JWT (use a strong, unique secret in prod) ────────────
jwt.secret=REPLACE_WITH_YOUR_STRONG_256BIT_SECRET_KEY_HERE
jwt.expiration-ms=86400000

# ── H2 Console (disable in production) ───────────────────
spring.h2.console.enabled=false

# ── Thymeleaf (enable caching in prod) ───────────────────
spring.thymeleaf.cache=true

# ── Logging ──────────────────────────────────────────────
logging.level.com.smartspend=INFO
