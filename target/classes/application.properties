# ============================
# SmartSpend 2.0 - Dev Config
# ============================

spring.application.name=SmartSpend

# ── Server ──────────────────────────────────────────────
server.port=8080

# ── H2 In-Memory Database (Development) ─────────────────
spring.datasource.url=jdbc:h2:mem:smartspend;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA / Hibernate ──────────────────────────────────────────────
# spring.jpa.database-platform is intentionally omitted — Hibernate auto-detects H2
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── JWT Configuration ────────────────────────────────────
# A 256-bit Base64-encoded secret (CHANGE THIS IN PRODUCTION!)
jwt.secret=SmartSpend2024SuperSecretKeyForJWTHS256SigningAlgorithm==
jwt.expiration-ms=86400000

# ── Thymeleaf ────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ── Logging ──────────────────────────────────────────────
logging.level.com.smartspend=DEBUG
logging.level.org.springframework.security=WARN
