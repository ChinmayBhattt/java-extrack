<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle != null ? pageTitle + ' | SmartSpend' : 'SmartSpend 2.0'}">SmartSpend 2.0</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>

    <!-- Bootstrap 5 Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>

    <!-- App CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}"/>

    <th:block th:replace="${extraHead}"></th:block>
</head>
<body>

<!-- ═══════════════════════════ SIDEBAR ═══════════════════════════ -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <span class="brand-icon">💸</span>
        <span class="brand-text">SmartSpend</span>
    </div>

    <nav class="sidebar-nav">
        <a th:href="@{/dashboard}" class="nav-item" th:classappend="${activePage == 'dashboard'} ? 'active'">
            <i class="bi bi-grid-1x2-fill"></i>
            <span>Dashboard</span>
        </a>
        <a th:href="@{/expenses}" class="nav-item" th:classappend="${activePage == 'expenses'} ? 'active'">
            <i class="bi bi-receipt"></i>
            <span>Expenses</span>
        </a>
        <a th:href="@{/budgets}" class="nav-item" th:classappend="${activePage == 'budgets'} ? 'active'">
            <i class="bi bi-wallet2"></i>
            <span>Budgets</span>
        </a>
        <a th:href="@{/profile}" class="nav-item" th:classappend="${activePage == 'profile'} ? 'active'">
            <i class="bi bi-person-circle"></i>
            <span>Profile</span>
        </a>
    </nav>

    <div class="sidebar-footer">
        <button class="logout-btn" onclick="logout()">
            <i class="bi bi-box-arrow-left"></i>
            <span>Logout</span>
        </button>
    </div>
</aside>

<!-- ═══════════════════════════ MAIN ═══════════════════════════════ -->
<main class="main-content">
    <!-- Top Navbar -->
    <header class="topbar">
        <button class="sidebar-toggle" onclick="toggleSidebar()">
            <i class="bi bi-list"></i>
        </button>
        <div class="topbar-title" th:text="${pageTitle ?: 'SmartSpend'}">SmartSpend</div>
        <div class="topbar-user">
            <span class="user-avatar">
                <i class="bi bi-person-fill"></i>
            </span>
        </div>
    </header>

    <!-- Page Body -->
    <div class="page-body">
        <!-- Alert Placeholder -->
        <div id="alertPlaceholder"></div>

        <!-- Page content injected here -->
        <th:block th:replace="${content}"></th:block>
    </div>
</main>

<!-- ═══════════════════════════ SCRIPTS ══════════════════════════── -->
<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/chat.js}"></script>
<th:block th:replace="${extraScripts}"></th:block>

</body>
</html>
