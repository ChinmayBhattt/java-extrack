<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Profile | SmartSpend 2.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><span class="brand-icon">💸</span><span class="brand-text">SmartSpend</span></div>
    <nav class="sidebar-nav">
        <a th:href="@{/dashboard}" class="nav-item"><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a>
        <a th:href="@{/expenses}"  class="nav-item"><i class="bi bi-receipt"></i><span>Expenses</span></a>
        <a th:href="@{/budgets}"   class="nav-item"><i class="bi bi-wallet2"></i><span>Budgets</span></a>
        <a th:href="@{/profile}"   class="nav-item active"><i class="bi bi-person-circle"></i><span>Profile</span></a>
    </nav>
    <div class="sidebar-footer"><button class="logout-btn" onclick="logout()"><i class="bi bi-box-arrow-left"></i><span>Logout</span></button></div>
</aside>

<main class="main-content">
    <header class="topbar">
        <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
        <div class="topbar-title">My Profile</div>
    </header>

    <div class="page-body">
        <div id="alertPlaceholder"></div>

        <div class="form-page-wrapper">
            <div class="card form-card" id="profileCard">
                <div class="card-header">
                    <h3><i class="bi bi-person-gear"></i> Account Settings</h3>
                </div>

                <!-- Profile loaded via JS -->
                <form id="profileForm" class="expense-form" style="display:none;">
                    <div class="form-grid">
                        <div class="form-group form-col-2">
                            <label for="name"><i class="bi bi-person"></i> Full Name</label>
                            <input type="text" id="name" name="name" placeholder="Your name" required/>
                        </div>

                        <div class="form-group form-col-2">
                            <label for="email"><i class="bi bi-envelope"></i> Email Address</label>
                            <input type="email" id="email" name="email" disabled
                                   title="Email cannot be changed"/>
                            <small class="form-hint">Email address cannot be changed</small>
                        </div>

                        <div class="form-group">
                            <label for="salary"><i class="bi bi-currency-rupee"></i> Monthly Salary (₹)</label>
                            <input type="number" id="salary" name="salary" placeholder="50000" min="0" step="100"/>
                            <small class="form-hint">Used for savings calculations and advice</small>
                        </div>

                        <div class="form-group">
                            <label for="newPassword"><i class="bi bi-lock"></i> New Password (optional)</label>
                            <input type="password" id="newPassword" name="newPassword"
                                   placeholder="Leave blank to keep current"/>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary" id="saveBtn">
                            <span id="saveBtnText">Save Changes</span>
                            <span id="saveSpinner" class="spinner" style="display:none;"></span>
                        </button>
                    </div>
                </form>

                <div id="profileLoading" class="loading-placeholder">
                    <div class="skeleton"></div>
                    <div class="skeleton short"></div>
                </div>
            </div>
        </div>
    </div>
</main>

<script th:src="@{/js/app.js}"></script>
<script>
// ── Fetch and populate profile on load ───────────────────────────────────
async function loadProfile() {
    try {
        const res  = await fetch('/api/users/me', { credentials: 'include' });
        const data = await res.json();

        if (res.ok) {
            document.getElementById('name').value   = data.name   || '';
            document.getElementById('email').value  = data.email  || '';
            document.getElementById('salary').value = data.salary || '';

            document.getElementById('profileLoading').style.display = 'none';
            document.getElementById('profileForm').style.display = '';
        }
    } catch (err) {
        showAlert('danger', 'Could not load profile.');
    }
}
loadProfile();

// ── Save profile ──────────────────────────────────────────────────────────
document.getElementById('profileForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn     = document.getElementById('saveBtn');
    const spinner = document.getElementById('saveSpinner');
    const btnText = document.getElementById('saveBtnText');

    btn.disabled = true;
    spinner.style.display = 'inline-block';

    const salaryVal = document.getElementById('salary').value;
    const pwdVal    = document.getElementById('newPassword').value;

    const payload = {
        name:        document.getElementById('name').value,
        salary:      salaryVal ? parseFloat(salaryVal) : null,
        newPassword: pwdVal || null
    };

    try {
        const res = await fetch('/api/users/me', {
            method: 'PUT', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (res.ok) {
            showAlert('success', 'Profile updated successfully! 🎉');
            document.getElementById('newPassword').value = '';
        } else {
            const data = await res.json();
            showAlert('danger', data.message || 'Could not update profile.');
        }
    } catch (err) {
        showAlert('danger', 'Connection error.');
    } finally {
        btn.disabled = false;
        spinner.style.display = 'none';
        btnText.textContent = 'Save Changes';
    }
});
</script>
</body>
</html>
